name: Flask CI Pipeline

on:
  push:
    branches: [ "master", "staging", "development" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "master", "staging", "development" ]

jobs:
  pipeline-ci:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do Código
      uses: actions/checkout@v4

    - name: Configurar Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Validar Build e Dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        python -m compileall todo_project/

    # ==========================================
    # ETAPA 4: ANÁLISE ESTÁTICA DE SEGURANÇA (SAST)
    # ==========================================
    - name: Executar Bandit (Análise Estática de Código)
      run: |
        pip install bandit
        # Executa a análise estática na pasta do código fonte
        bandit -r todo_project/

    - name: Executar Análise de Dependências (Pip-Audit / OWASP)
      run: |
        pip install pip-audit
        # Varre o requirements procurando pacotes vulneráveis conhecidos internacionalmente
        pip-audit -r requirements.txt

    # ==========================================
    # ETAPA DE TESTES (Validação Estrutural)
    # ==========================================
    - name: Executar Testes Automatizados
      run: |
        if [ -d tests ]; then
          PYTHONPATH=. python -m unittest discover -s tests
        else
          echo "Nenhuma pasta de testes encontrada. Validando integridade estrutural dos arquivos Python..."
          python -m compileall todo_project/
          echo "Todos os módulos e sintaxes validados com sucesso!"
        fi

name: Flask CI Pipeline

on:
  push:
    branches: [ "master", "staging", "development" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "master", "staging", "development" ]

jobs:
  pipeline-ci:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do Código
      uses: actions/checkout@v4

    - name: Configurar Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Validar Build e Dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        python -m compileall todo_project/

    # ==========================================
    # ETAPA 4: ANÁLISE ESTÁTICA DE SEGURANÇA (SAST)
    # ==========================================
    - name: Executar Bandit (Análise Estática de Código)
      run: |
        pip install bandit
        bandit -r todo_project/

    - name: Executar Análise de Dependências (Pip-Audit / OWASP)
      run: |
        pip install pip-audit
        pip-audit -r requirements.txt

    # ==========================================
    # ETAPA DE TESTES (Validação Estrutural)
    # ==========================================
    - name: Executar Testes Automatizados
      run: |
        if [ -d tests ]; then
          PYTHONPATH=. python -m unittest discover -s tests
        else
          echo "Nenhuma pasta de testes encontrada. Validando integridade estrutural..."
          python -m compileall todo_project/
        fi

    # ==========================================
    # ETAPA 5: ANÁLISE DINÂMICA DE SEGURANÇA (DAST) - COM DOCKER
    # ==========================================
    - name: Construir Imagem Docker da Aplicação
      run: |
        # Constrói a imagem a partir do seu Dockerfile
        docker build -t minha-app-flask:latest .

    - name: Iniciar Container da Aplicação para o DAST
      run: |
        # Roda a aplicação mapeando a porta 8080 na rede do host em background (-d)
        docker run -d --name app-container -p 8080:8080 minha-app-flask:latest
        
        # Aguarda 5 segundos para garantir que o Flask inicializou dentro do container
        echo "Aguardando inicialização do container..."
        sleep 5
        curl -v http://localhost:8080 || (docker logs app-container && exit 1)

    - name: Executar OWASP ZAP Baseline Scan (DAST)
      run: |
        mkdir -p zap-reports
        chmod 777 zap-reports
        
        # Executa o scan apontando para o container que está rodando na porta 8080
        docker run --user root --network="host" -v $(pwd)/zap-reports:/zap/wrk/:rw ghcr.io/zaproxy/zaproxy:stable zap-baseline.py \
          -t http://localhost:8080 \
          -r relatorio_dast.html \
          -I
          
    - name: Parar Container da Aplicação
      if: always()
      run: |
        docker stop app-container || true
        docker rm app-container || true

    - name: Arquivar Relatório do DAST (OWASP ZAP)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: relatorio-owasp-zap-dast
        path: zap-reports/relatorio_dast.html

name: Flask CI Pipeline

on:
  push:
    branches: [ "master", "staging", "development" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "master", "staging", "development" ]

jobs:
  pipeline-ci:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do Código
      uses: actions/checkout@v4

    - name: Configurar Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Validar Build e Dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        python -m compileall todo_project/

    - name: Executar Bandit - SAST
      run: |
        pip install bandit
        bandit -r todo_project/

    - name: Executar Pip-Audit - Análise de Dependências
      run: |
        pip install pip-audit
        pip-audit -r requirements.txt

    - name: Executar Testes Automatizados
      run: |
        if [ -d tests ]; then
          PYTHONPATH=. python -m unittest discover -s tests
        else
          echo "Nenhuma pasta de testes encontrada. Validando integridade estrutural..."
          python -m compileall todo_project/
        fi

    - name: Construir Imagem Docker da Aplicação
      run: |
        docker build -t flask-task-manager .

    - name: Iniciar Aplicação Flask em Container
      run: |
        docker run -d \
          --name flask-app \
          -p 8080:8080 \
          -e SECRET_KEY=test-secret \
          flask-task-manager

        echo "Aguardando inicialização..."
        sleep 10

        curl -I http://localhost:8080/

    - name: Executar OWASP ZAP Baseline Scan - DAST
      run: |
        mkdir -p zap-reports
        chmod 777 zap-reports

        docker run \
          --user root \
          --network="host" \
          -v $(pwd)/zap-reports:/zap/wrk/:rw \
          ghcr.io/zaproxy/zaproxy:stable \
          zap-baseline.py \
          -t http://localhost:8080 \
          -r relatorio_dast.html \
          -I

    - name: Parar Container da Aplicação
      if: always()
      run: |
        docker stop flask-app || true
        docker rm flask-app || true

    - name: Arquivar Relatório do DAST - OWASP ZAP
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: relatorio-owasp-zap-dast
        path: zap-reports/relatorio_dast.html

    # ==========================================
    # ETAPA 6: ENTREGA CONTÍNUA (CD)
    # ==========================================

    - name: Criar Ambiente de Review
      if: github.event_name == 'pull_request'
      run: |
        echo "Criando ambiente temporário de revisão..."
        echo "Review URL: https://review-${{ github.event.number }}.example.com"

    - name: Deploy em Stage
      run: |
        echo "Realizando deploy para ambiente Stage..."

        docker run -d \
          --name stage-app \
          -p 8081:8080 \
          -e SECRET_KEY=stage-secret \
          flask-task-manager

        sleep 10

        curl -I http://localhost:8081/

    - name: Executar DAST no Ambiente Stage
      run: |
        mkdir -p zap-stage-reports

        docker run \
          --user root \
          --network="host" \
          -v $(pwd)/zap-stage-reports:/zap/wrk/:rw \
          ghcr.io/zaproxy/zaproxy:stable \
          zap-baseline.py \
          -t http://localhost:8081 \
          -r relatorio_dast_stage.html \
          -I

    - name: Encerrar Ambiente Stage
      if: always()
      run: |
        docker stop stage-app || true
        docker rm stage-app || true

    - name: Arquivar Relatório DAST Stage
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: relatorio-owasp-zap-stage
        path: zap-stage-reports/relatorio_dast_stage.html

